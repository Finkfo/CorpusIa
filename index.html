<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css"
    />
    <!-- 'classic' theme -->
  </head>
  <body>
    <div class="Buttons">
      <h4>Metallic :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="1"
        value="0.5"
        class="slider"
        id="metallicRange"
        step="0.01"
      />
      <span>1</span>
      <p>Your input : <span id="metallicOutput"></span></p>

      <h4>Roughness :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="1"
        value="1"
        class="slider"
        id="roughnessRange"
        step="0.1"
      />
      <span>1</span>
      <p>Your input : <span id="roughnessOutput"></span></p>

      <h4>Ambient Occlusion :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="1"
        value="1"
        class="slider"
        id="ambientOcclusionRange"
        step="0.1"
      />
      <span>1</span>
      <p>Your input : <span id="ambientOcclusionOutput"></span></p>

      <h3>ClearCoat Options :</h3>

      <h4>Emission intensisty</h4>
      <span>0</span>
      <input
        type="range"
        min="0"
        max="1"
        value="1"
        class="slider"
        id="EmissionIntensityRange"
        step="0.1"
      />
      <span>1</span>
      <p>Your input : <span id="EmissionIntensityOutput"></span></p>

      <h4>ClearCoat Roughness</h4>
      <span>0</span>
      <input
        type="range"
        min="0"
        max="1"
        value="0"
        class="slider"
        id="ClearCoatRoughnessRange"
        step="0.1"
      />
      <span>1</span>
      <p>Your input : <span id="ClearCoatRoughnessOutput"></span></p>

      <h4>ClearCoat Strenght</h4>
      <span>0</span>
      <input
        type="range"
        min="0"
        max="1"
        value="0.2"
        class="slider"
        id="ClearCoatStrengthRange"
        step="0.1"
      />
      <span>1</span>
      <p>Your input : <span id="ClearCoatStrengthOutput"></span></p>

      <h4>ClearCoat Normal Text Scale</h4>
      <span>0</span>
      <input
        type="range"
        min="0"
        max="1"
        value="0.5"
        class="slider"
        id="ClearCoatNormalTextScaleRange"
        step="1"
      />
      <span>1</span>
      <p>Your input : <span id="ClearCoatNormalTextScaleOutput"></span></p>
    </div>

    <div class="color">
      <div class="colorButton">
        <button onclick="DoubleSided()">Double sided Button</button>
        <div class="color-picker"></div>
      </div>
    </div>

    <button onclick="toggleRotate()">Rotate</button>

    <div class="canvas-container">
      <!-- CANVAS -->
      <canvas
        id="display-canvas"
        oncontextmenu="event.preventDefault()"
      ></canvas>
    </div>

    <!-- LIVELINK SDK -->
    <script src="https://cdn.3dverse.com/legacy/sdk/latest/SDK3DVerse.js"></script>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <script>
      // Simple example, see optional options for more configuration.
      const pickr = Pickr.create({
        el: ".color-picker",
        theme: "nano", // or 'monolith', or 'nano'

        swatches: [
          "rgba(7, 192, 99, 0.95)",
        ],

        components: {
          // Main components
          preview: true,
          opacity: true,
          hue: true,

          // Input / output Options
          interaction: {
            hex: true,
            rgba: true,
            hsla: false,
            hsva: false,
            cmyk: false,
            input: true,
            clear: true,
            save: true,
          },
        },
      });

      pickr.on("change", (...args) => {
        let color = args[0].toRGBA();
        let numericValues = color.map((value) => value / 255);
        this.colorPicked = numericValues;
      });

      pickr.on("save", (...args) => {
        let color = args[0].toRGBA();
        console.log(color);
        pickr.addSwatch(`rgba(${color[0]}, ${color[1]}, ${color[2]}, ${color[3]})`);
      });

      pickr.on("clear", (...args) => {
        pickr.removeSwatch(1);
      });
    </script>
  </body>
</html>
