<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="Buttons">
      <h4>Metallic :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="1"
        value="0.5"
        class="slider"
        id="metallicRange"
        step="0.01"
      />
      <span>1</span>
      <p>Your input : <span id="metallicOutput"></span></p>

      <h4>Roughness :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="1"
        value="0.5"
        class="slider"
        id="roughnessRange"
        step="0.1"
      />
      <span>1</span>
      <p>Your input : <span id="roughnessOutput"></span></p>

      <h4>Ambient Occlusion :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="1"
        value="0.5"
        class="slider"
        id="ambientOcclusionRange"
        step="0.1"
      />
      <span>1</span>
      <p>Your input : <span id="ambientOcclusionOutput"></span></p>
    </div>

    <button onclick="toggleRotate()">Rotate</button>
    <button onclick="colorPicking(colors.purple)">"Purple" button</button>
    <button onclick="colorPicking(colors.orange)">"Orange" Button</button>
    <button onclick="updateCamera('sharpen')">Toggle Sharpen</button>
    <button onclick="updateCamera('filterSpecular')">
      Toggle Filter Specular
    </button>
    <button onclick="updateCamera('bloom')">Toggle Bloom</button>

    <div class="Set Sun hidden">
      <h4>Sun X Orientation :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="360"
        value="240"
        class="slider"
        id="sunXRange"
        step="5"
      />
      <span>360</span>
      <p>Your input : <span id="sunXOutput"></span></p>

      <!-- Ajoutez une classe "hidden" à ces éléments -->
      <h4>Sun Y Orientation :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="360"
        value="0"
        class="slider hidden"
        id="sunYRange"
        step="5"
      />
      <span>360</span>
      <p>Your input : <span id="sunYOutput"></span></p>

      <h4>Sun Z Orientation :</h4>
      <span>0</span
      ><input
        type="range"
        min="0"
        max="360"
        value="0"
        class="slider hidden"
        id="sunZRange"
        step="5"
      />
      <span>360</span>
      <p>Your input : <span id="sunZOutput"></span></p>

      <button onclick="getSun()" class="hidden">Get Sun</button>
    </div>

    <button onclick="updateCamera('gradient')">Activate Gradient</button>
    <button onclick="setSunOrientation(true)">Activate Sun</button>

    <div class="canvas-container">
      <!-- CANVAS -->
      <canvas
        id="display-canvas"
        oncontextmenu="event.preventDefault()"
      ></canvas>
    </div>

    <!-- LIVELINK SDK -->
    <script src="https://cdn.3dverse.com/legacy/sdk/latest/SDK3DVerse.js"></script>
    <script src="main.js"></script>
  </body>
</html>
