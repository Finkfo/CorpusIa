<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width,initial-scale=1.0" name="viewport" />
    <style>
        .canvas-container {
            width: 100vw;
            height: 100vh;
            align-items: center;
            display: flex;
            justify-content: center;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="Buttons">
        <h4>Metallic : </h4>
        <span>0</span><input type="range" min="0" max="1" value="0.5" class="slider" id="metallicRange" step="0.01"> <span>1</span>
        <p>Your input : <span id="metallicOutput"></span></p>

        <h4>Roughness : </h4>
        <span>0</span><input type="range" min="0" max="1" value="0.5" class="slider" id="roughnessRange" step="0.1"> <span>1</span>
        <p>Your input : <span id="roughnessOutput"></span></p>

        <h4>Ambient Occlusion : </h4>
        <span>0</span><input type="range" min="0" max="1" value="0.5" class="slider" id="ambientOcclusionRange" step="0.1"> <span>1</span>
        <p>Your input : <span id="ambientOcclusionOutput"></span></p>
    </div>

    <script>
        // Reusable function for setting up sliders
        function setupSlider(sliderId, outputId) {
            var slider = document.getElementById(sliderId);
            var output = document.getElementById(outputId);
            var value;

            // Initialize value and set initial HTML
            value = parseFloat(slider.value);
            output.innerHTML = value;

            // Update the displayed value on slider input
            slider.oninput = function () {
                value = parseFloat(this.value);
                output.innerHTML = value;
                console.log(`${outputId} Value: `, value);
            }
            return {
                getValue: function () {
                    return value;
                }
            };
        }

        // Setup each slider using the reusable function
        var metallicSlider = setupSlider("metallicRange", "metallicOutput");
        var roughnessSlider = setupSlider("roughnessRange", "roughnessOutput");
        var ambientOcclusionSlider = setupSlider("ambientOcclusionRange", "ambientOcclusionOutput");
    </script>

    <button onclick="colorPicking(colors.purple)">"Purple" button</button>
    <button onclick="colorPicking(colors.orange)">"Orange" Button</button>

    <div class="canvas-container">
        <!-- CANVAS -->
        <canvas id="display-canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>

    <!-- LIVELINK SDK -->
    <script src="https://cdn.3dverse.com/legacy/sdk/latest/SDK3DVerse.js"></script>

    <script>
        const entities = SDK3DVerse.engineAPI.findEntitiesByNames('Teapot');

        const colors = {red: [255, 0, 0],green: [0, 255, 0],blue: [0, 0, 255], orange: [255, 165, 0],purple: [255, 0, 255],};

        // Entity selection
        async function selectEntity(event) {
            const keepOldSelection = event.ctrlKey;
            const { entity } = await SDK3DVerse.engineAPI.castScreenSpaceRay(event.clientX, event.clientY, true, keepOldSelection);

            if (entity) {
                console.log('Selected entity', entity.getName());
                desc(entity);
            } else {
                console.log('No entity selected');
            }
        }

        // Function to modify color called in the color buttons
        async function colorPicking(color){
          return colorPicked = color;
          console.log(colorPicked);
        }

        async function ARM(entity){
          entity.setComponent('material', {
            dataJSON : {
              metallic: metallicSlider.getValue(),
              roughness: roughnessSlider.getValue(),
              ambientOcclusion: ambientOcclusionSlider.getValue(),
            }
          });
          console.log(entity.getComponent('material'));
        };

        async function desc(entity){
          entity.setComponent('material', {
            dataJSON : {
              albedo : colorPicked,
              metallic: metallicSlider.getValue(),
              roughness: roughnessSlider.getValue(),
              ambientOcclusion: ambientOcclusionSlider.getValue(),
            }
          })
        }

        // Initialization
        async function InitApp() {
            await SDK3DVerse.joinOrStartSession({
                userToken: "public_MP5wxRDATTlIeygo",
                sceneUUID: "fdc3e279-0279-4cac-bfdf-86646d7d6902",
                canvas: document.getElementById("display-canvas"),
                viewportProperties: {
                    defaultControllerType: SDK3DVerse.controller_type.editor,
                },
                connectToEditor: true,
            });

            SDK3DVerse.notifier.on('onEntitySelectionChanged', (selectedEntities, unselectedEntities) => {
                console.log('Selected', selectedEntities);
                console.log('Unselected', unselectedEntities);
            });

            document.getElementById("display-canvas").addEventListener('click', selectEntity);
        }

        window.addEventListener("load", InitApp);
    </script>
</body>
</html>
